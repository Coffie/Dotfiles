files:
  copy:
    - '<global>'
  symlink:
    - '<global>'

panes:
  - command: <agent>
    focus: true
  - split: vertical
    percentage: 30
  - command: "watchexec -e go -r -- gotestsum --format testdox ./..."
    split: horizontal
  # Uncomment and set the server path (e.g. ./cmd/server):
  # - command: "air -build.cmd 'go build -o ./tmp/main {add path to server here}' -build.bin ./tmp/main"
  #   split: horizontal
